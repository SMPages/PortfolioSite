<header [class]="'header ' + (isScrolled ? 'scrolled' : '')">
  <nav class="nav">
    <div class="container">
      <div class="nav-content">
        <!-- Logo -->
        <a class="logo" href="#inicio" (click)="scrollToSection('inicio')" aria-label="DevSebas">
          <span class="logo__symbol">&lt;/&gt;</span>
          <span class="logo__text">DEV-SEBAS</span>
        </a>

        <!-- NAV centrada (sin Contacto) -->
        <div class="nav-links desktop-nav nav-center" role="navigation" aria-label="Navegación principal">
          <a href="#inicio" (click)="scrollToSection('inicio')">Inicio</a>
          <a href="#servicios" (click)="scrollToSection('servicios')">Servicios</a>
          <a href="#proyectos" (click)="scrollToSection('proyectos')">Proyectos</a>
          <a href="#testimonios" (click)="scrollToSection('testimonios')">Testimonios</a>
          <a href="#blog" (click)="scrollToSection('blog')">Blog</a>
        </div>

        <!-- CTA a la derecha -->
        <div class="cta-right desktop-nav">
          <a href="#contacto" (click)="scrollToSection('contacto')" class="btn-primary">Contacto</a>
        </div>

        <!-- Botón Mobile -->
        <button
          class="mobile-menu-btn"
          (click)="toggleMobileMenu()"
          [attr.aria-expanded]="isMobileMenuOpen"
          aria-label="Abrir menú de navegación">
          <span class="hamburger-line" [class.active]="isMobileMenuOpen"></span>
          <span class="hamburger-line" [class.active]="isMobileMenuOpen"></span>
          <span class="hamburger-line" [class.active]="isMobileMenuOpen"></span>
        </button>
      </div>

      <!-- Navegación Mobile -->
      <div class="mobile-nav" [class.open]="isMobileMenuOpen" role="navigation" aria-label="Navegación móvil">
        <a href="#inicio" (click)="scrollToSection('inicio')">Inicio</a>
        <a href="#servicios" (click)="scrollToSection('servicios')">Servicios</a>
        <a href="#proyectos" (click)="scrollToSection('proyectos')">Proyectos</a>
        <a href="#testimonios" (click)="scrollToSection('testimonios')">Testimonios</a>
        <a href="#blog" (click)="scrollToSection('blog')">Blog</a>
        <a href="#contacto" (click)="scrollToSection('contacto')" class="btn-primary">Contacto</a>
      </div>
    </div>
  </nav>
</header>
