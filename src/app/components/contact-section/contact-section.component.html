<section id="contacto" class="contact-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Hablemos de tu proyecto</h2>
      <p class="section-subtitle">
        ¿Tienes una idea? Conversemos sobre cómo puedo ayudarte a hacerla realidad
      </p>
    </div>

    <div class="contact-grid">
      <!-- Contact Form -->
      <div class="contact-form-card">
        <div class="card-header">
          <h3 class="card-title">Envíame un mensaje</h3>
          <p class="card-description">Completa el formulario y te responderé en menos de 24 horas</p>
        </div>

        <form (ngSubmit)="onSubmit()" class="contact-form">
          <div class="form-group">
            <label for="name">Nombre completo</label>
            <input
              id="name" name="name" type="text" placeholder="Tu nombre"
              [(ngModel)]="formData.name" required class="form-input"
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email" name="email" type="email" placeholder="tu@email.com"
              [(ngModel)]="formData.email" required class="form-input"
            />
          </div>

          <div class="form-group">
            <label for="message">Mensaje</label>
            <textarea
              id="message" name="message" rows="5" placeholder="Cuéntame sobre tu proyecto..."
              [(ngModel)]="formData.message" required class="form-textarea"
            ></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-icon">
            <i class="bi bi-whatsapp" aria-hidden="true"></i>
            Enviar por WhatsApp
          </button>
          <!-- Alternativa por correo:
          <button type="button" class="btn btn-outline-secondary btn-full btn-icon" (click)="onSubmit('email')">
            <i class="bi bi-envelope" aria-hidden="true"></i> Enviar por Email
          </button> -->
        </form>
      </div>

      <!-- Contact Info -->
      <div class="contact-info">
        <!-- WhatsApp -->
        <div class="contact-card whatsapp">
          <div class="contact-header">
            <div class="contact-icon">
              <i class="bi bi-whatsapp" aria-hidden="true"></i>
            </div>
            <div class="contact-details">
              <h4>WhatsApp</h4>
              <p>Respuesta inmediata</p>
            </div>
          </div>
          <a
            [href]="quickWhatsAppHref" target="_blank" rel="noopener noreferrer"
            class="btn btn-outline-primary btn-full btn-icon"
            aria-label="Escribir por WhatsApp a Sebastian"
          >
            <i class="bi bi-whatsapp" aria-hidden="true"></i>
            Escribir por WhatsApp
          </a>
        </div>

        <!-- Email -->
        <div class="contact-card email">
          <div class="contact-header">
            <div class="contact-icon">
              <i class="bi bi-envelope" aria-hidden="true"></i>
            </div>
            <div class="contact-details">
              <h4>Email</h4>
              <a [href]="mailtoHref">Dev-Sebas&#64;outlook.com</a>
            </div>
          </div>
          <a [href]="mailtoHref" class="btn btn-outline-secondary btn-full btn-icon">
            <i class="bi bi-envelope" aria-hidden="true"></i>
            Enviar email
          </a>
        </div>

        <!-- Social Links -->
        <div class="social-section">
          <h4>Sígueme en redes</h4>
          <div class="social-links">
            <a href="https://www.linkedin.com/in/sebastian-marciales/"
               target="_blank" rel="noopener noreferrer"
               class="social-link" aria-label="LinkedIn">
              <i class="bi bi-linkedin" aria-hidden="true"></i>
            </a>
            <a href="https://github.com/SMPages"
               target="_blank" rel="noopener noreferrer"
               class="social-link" aria-label="GitHub">
              <i class="bi bi-github" aria-hidden="true"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
