<section id="blog" class="blog-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Últimas Publicaciones</h2>
      <p class="section-subtitle">
        Comparto conocimientos sobre desarrollo, arquitectura y mejores prácticas
      </p>
    </div>

  <div class="blog-grid">
  <article class="blog-card" *ngFor="let post of visiblePosts; trackBy: trackBySlug">
    <!-- Enlace envolviendo la imagen -->
    <a class="blog-image" [routerLink]="['/blog', post.slug]">
      <img [src]="post.image" [alt]="post.title" loading="lazy" decoding="async" />
      <span class="blog-category">{{ post.category }}</span>
    </a>

    <div class="blog-content">
      <div class="blog-meta">
        <i class="bi bi-calendar3" aria-hidden="true"></i>
        <span>{{ post.date }}</span>
        <span>•</span>
        <span>{{ post.readTime }} lectura</span>
      </div>

      <h3 class="blog-title">
        <a [routerLink]="['/blog', post.slug]">{{ post.title }}</a>
      </h3>

      <p class="blog-description">{{ post.description }}</p>

      <a class="blog-link" [routerLink]="['/blog', post.slug]">
        Leer más
        <i class="bi bi-arrow-right" aria-hidden="true"></i>
      </a>
    </div>
  </article>
</div>


    <div class="section-cta">
      <!-- Cargar más si hay -->
      <button *ngIf="hasMore; else allLink"
              class="btn btn-outline-secondary"
              (click)="loadMore()">
        Ver más artículos
      </button>
      <!-- Si ya no hay más, link a /blog -->
      <ng-template #allLink>
        <a class="btn btn-outline-secondary" [routerLink]="['/blog']">
          Leer todos los artículos
        </a>
      </ng-template>
    </div>
  </div>
</section>
