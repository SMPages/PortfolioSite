<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <!-- Logo and Description -->
      <div class="footer-section">
        <h3 class="footer-logo">DevSebas</h3>
        <p class="footer-description">
          Senior Developer
        </p>
      </div>

      <!-- Quick Links -->
      <div class="footer-section">
        <h4 class="footer-title">Enlaces rápidos</h4>
        <nav class="footer-nav">
          <a *ngFor="let link of navLinks" [href]="link.href" class="footer-link">
            {{ link.label }}
          </a>
        </nav>
      </div>

      <!-- Social Links -->
      <div class="footer-section">
        <h4 class="footer-title">Sígueme</h4>
        <div class="social-links">
          <a
            href="https://www.linkedin.com/in/sebastian-marciales/"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link linkedin"
            aria-label="LinkedIn de DevSebas"
          >
            <i class="bi bi-linkedin" aria-hidden="true"></i>
          </a>
          <a
            href="https://github.com/SMPages"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link github"
            aria-label="GitHub de DevSebas"
          >
            <i class="bi bi-github" aria-hidden="true"></i>
          </a>
          <!-- Opcional: WhatsApp directo -->
          <a
            href="https://wa.me/573228969215?text=Hola%20Sebastian%2C%20vengo%20desde%20tu%20web%20DevSebas.%20Me%20interesa%20crear%20una%20p%C3%A1gina%20para%20mi%20negocio."
            target="_blank"
            rel="noopener noreferrer"
            class="social-link whatsapp"
            aria-label="Escribir por WhatsApp a DevSebas"
          >
            <i class="bi bi-whatsapp" aria-hidden="true"></i>
          </a>
        </div>
      </div>
    </div>

    <!-- Copyright -->
    <div class="footer-bottom">
      <p class="copyright">© {{ currentYear }} DevSebas. Todos los derechos reservados.</p>
    </div>
  </div>
</footer>
